name: ⚽ Football Bot
on:
  schedule:
    - cron: '0 */5 * * *'
  workflow_dispatch:
jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 295
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - uses: actions/download-artifact@v4
        with:
          name: football-db
          path: .
        continue-on-error: true
      - name: Run bot
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          GROUP_CHAT_ID: ${{ secrets.GROUP_CHAT_ID }}
        run: timeout 17100 python bot.py || true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: football-db
          path: football.db
          retention-days: 7
          overwrite: true
